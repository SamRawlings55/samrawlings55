<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam Rawlings</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Sam Rawlings">
  <meta property="og:description" content="My Personal Blog.">
  <meta property="og:url" content="https://samrawlings.net">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <a class="site-name" href="index.html">Sam Rawlings</a>
  <nav>
    <a href="index.html" class="active">home</a>
    <a href="writing.html">writing</a>
    <a href="shelf.html">shelf</a>
    <a href="photos.html">photos</a>
  </nav>

  <!-- ↓ CHANGE THIS — your intro sentence -->
  <p class="intro">
    I'm Sam. I'm a teacher based in Melbourne. I'm interested in trying new things... including this!
  </p>

  <!-- Recent writing — auto-loaded from writing.html, no editing needed -->
  <div class="home-section">
    <div class="section-head">
      <span class="section-label">recent writing</span>
      <span class="section-label"><a href="writing.html">see all →</a></span>
    </div>
    <div id="recent-writing">
      <!-- loads automatically from writing.html -->
    </div>
  </div>

  <!-- Recent shelf — auto-loaded from shelf.html, no editing needed -->
  <div class="home-section">
    <div class="section-head">
      <span class="section-label">recently on the shelf</span>
      <span class="section-label"><a href="shelf.html">see all →</a></span>
    </div>
    <div id="recent-shelf">
      <!-- loads automatically from shelf.html -->
    </div>
  </div>

</div>

<script>
  // Loads the 3 most recent writing entries from writing.html
  fetch('writing.html')
    .then(r => r.text())
    .then(html => {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const rows = doc.querySelectorAll('a.row');
      const target = document.getElementById('recent-writing');
      Array.from(rows).slice(0, 3).forEach(row => {
        target.appendChild(row.cloneNode(true));
      });
    });

  // Loads the 3 most recent shelf entries from shelf.html
  fetch('shelf.html')
    .then(r => r.text())
    .then(html => {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const rows = doc.querySelectorAll('.row[data-type]');
      const target = document.getElementById('recent-shelf');
      Array.from(rows).slice(0, 3).forEach(row => {
        const clone = row.cloneNode(true);
        clone.style.display = 'flex';
        target.appendChild(clone);
      });
    });
</script>

</body>
</html>
